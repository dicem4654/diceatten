
<html>
<head>
<title>DICE-M Attendance System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  width:400px;
  padding:50px;
  border-radius:15px;
  box-shadow:0 20px 35px rgba(0,0,0,0.3);
  text-align:center;
}

h2{
  font-size:40px;
  margin-bottom:20px;
  color:#203a43;
}

h3{
  
  margin-top:0;
  color:gray;
  font-size:20px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  background:#dc3545;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#a71d2a;
}

.success{
  color:green;
  font-size:20px;
}

@media print{
  body{
    background:white;
  }
  button{
    display:none;
  }

}
</style>
</head>

<body>

<div class="card">


<h2>DICE-M COMPUTER ACADEMY</h2>
<h3>Attendance System</h3>

<input type="text" id="student" placeholder="Enter Name" required>

<select id="role" required>
<option value="">Select Role</option>
<option value="Student">Student</option>
<option value="Teacher">Teacher</option>
</select>

<select id="status" required >
<option value="P">select P/A</option>
<option value="P">Present</option>
<option value="A">Absent</option>
</select>

<button onclick="mark()">Submit Attendance</button>
<p class="footer-text">
Digital Institute of Computer Education-Mission</p>

<p class="success" id="msg"></p>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyEbX24FjdH_XfxBPwyPzDEU8fB4tZSaILg-QYcsQ4EFVgLSm1lxudMwTge7-36te3bFA/exec";

function mark(){

  var name = document.getElementById("student").value;
  var role = document.getElementById("role").value;
  var status = document.getElementById("status").value;

  if(name=="" || role==""){
    alert("Please fill all fields");
    return;
  }

  fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify({
      name:name,
      role:role,
      status:status
    })
  })
  .then(res=>res.text())
  .then(data=>{
    document.getElementById("msg").innerHTML="Attendance Saved Successfully ✅";
    document.getElementById("student").value="";
  })
  .catch(error=>{
    alert("Error Saving Attendance ❌");
  });
}

</script>

</body>
</html>
